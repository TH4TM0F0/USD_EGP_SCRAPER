name: EGP/USD Rate Scraper

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit data back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          EMAIL_SENDER: ${{ secrets.SMTP_AUTH_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.SMTP_AUTH_PASS }}
          EMAIL_RECEIVER: ${{ secrets.SMTP_RECV_EMAIL }}
        run: python src/scraper.py

      - name: Commit and push data
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ utils/
          git diff --staged --quiet || git commit -m "data: scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push